<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Teto Tsundere App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 20px; }
        .teto-img { width: 300px; height: 300px; object-fit: cover; border-radius: 20px; margin: 20px auto; display: block; }
        #chat-area { border: 2px solid #ff69b4; padding: 15px; height: 250px; overflow-y: auto; width: 90%; margin: 10px auto; background: white; text-align: left; border-radius: 10px; }
        input { padding: 10px; width: 70%; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h2 id="status">Teto: ...</h2>
    <!-- Foto awal pakai JPG -->
    <img src="teto_ngambek.jpg" id="tetoFoto" class="teto-img">
    <div id="chat-area">Teto: Hah? Ngapain lo di sini?</div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu...">
    <button onclick="prosesChat()">Kirim</button>

    <script>
        let affection = parseInt(localStorage.getItem('teto_affection')) || 0;
        let histori = JSON.parse(localStorage.getItem('teto_histori')) || [];
        let fotoSatu = true;
        let intervalAnimasi = null;

        // Fungsi Animasi: Gonta-ganti antara JPG dan PNG saat bicara
        function animasiBicara(aktif) {
            if (aktif) {
                intervalAnimasi = setInterval(() => {
                    document.getElementById('tetoFoto').src = fotoSatu ? "teto_ngambek.jpg" : "teto_ngambek.png";
                    fotoSatu = !fotoSatu;
                }, 300);
            } else {
                clearInterval(intervalAnimasi);
                // Balik ke JPG saat selesai bicara
                document.getElementById('tetoFoto').src = "teto_ngambek.jpg";
            }
        }

        async function prosesChat() {
            let input = document.getElementById("userInput").value;
            if (!input) return;
            
            let key = localStorage.getItem('gemini_key');
            let display = document.getElementById("chat-area");
            let status = document.getElementById("status");

            display.innerHTML += "<br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";
            animasiBicara(true); // Animasi mulai

            affection++;
            localStorage.setItem('teto_affection', affection);
            histori.push(input);
            localStorage.setItem('teto_histori', JSON.stringify(histori));

            let sapaan = affection > 5 ? "Kamu..." : "Oi,";
            let respon = "";

            if (key) {
                status.innerText = "Mood: Good Mood (Tsundere) 😊";
                try {
                    let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + key, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Berperan sebagai Teto Tsundere. Poin kedekatan: ${affection}. Makin tinggi makin halus. Respon: ${input}` }] }] })
                    });
                    let data = await res.json();
                    if (data.error) throw new Error("Kredit Habis");
                    respon = data.candidates[0].content.parts[0].text;
                } catch(e) {
                    respon = `${sapaan} kredit gue abis! Puas lo?! Nih cari sendiri di Google.`;
                    window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
                }
            } else {
                status.innerText = "Mood: Ngambek (Mode Search) 😡";
                respon = `${sapaan} dasar beban! Gak punya API Key malah nanya ke gue. Cari sendiri sana!`;
                window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
            }

            setTimeout(() => {
                display.innerHTML += `<br><b>Teto:</b> ${respon}`;
                animasiBicara(false); // Animasi berhenti
            }, 1000);
        }
    </script>
</body>
</html>
