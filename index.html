<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Tsundere App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 15px; }
        
        /* Foto Kotak Sempurna */
        .media-container { width: 95%; aspect-ratio: 1 / 1; margin: 10px auto; border: 4px solid #ff69b4; border-radius: 20px; overflow: hidden; background: white; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Chat Box Besar */
        #chat-area { border: 3px solid #ff69b4; padding: 20px; height: 400px; overflow-y: auto; width: 95%; margin: 10px auto; background: white; text-align: left; border-radius: 15px; font-size: 18px; }
        
        /* Panel & Input Besar */
        .admin-panel { background: #ffe4e1; padding: 20px; border-radius: 15px; border: 2px solid #ff69b4; margin-bottom: 20px; }
        #apiKey { width: 70%; padding: 15px; font-size: 18px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 10px; background: #ff69b4; color: white; border: none; }
        #status-msg { font-weight: bold; color: #d63384; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <strong>Teto Settings:</strong><br>
        <input type="text" id="apiKey" placeholder="Paste API Key di sini...">
        <button onclick="testAndSaveKey()">Simpan & Cek</button>
        <div id="status-msg">Status: Belum ada API Key</div>
    </div>

    <h2 id="mood-title">Mood: Ngambek 😡</h2>
    <div class="media-container">
        <img src="teto_ngambek.jpg" id="tetoImg">
    </div>

    <div id="chat-area">Teto: Hah? Ngapain lo di sini?</div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu..." style="width: 70%; padding: 15px; font-size: 18px;">
    <button onclick="handleChat()" style="padding: 15px;">Kirim</button>

    <script>
        async function testAndSaveKey() {
            let key = document.getElementById('apiKey').value;
            let msg = document.getElementById('status-msg');
            let img = document.getElementById('tetoImg');
            let title = document.getElementById('mood-title');

            msg.innerText = "Mengecek...";
            
            try {
                let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
                });

                if (res.status === 200) {
                    localStorage.setItem('gemini_key', key);
                    msg.innerText = "Status: Key Valid! 😊";
                    title.innerText = "Mood: Good Mood (Tsundere) 😊";
                    img.src = "teto_good.jpg"; // Pastikan kamu punya file teto_good.jpg
                } else {
                    msg.innerText = "Status: Key Salah / Kredit Habis! ❌";
                    title.innerText = "Mood: Ngambek 😡";
                    img.src = "teto_ngambek.jpg";
                }
            } catch(e) {
                msg.innerText = "Status: Gagal koneksi!";
            }
        }

        async function handleChat() {
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            let key = localStorage.getItem('gemini_key');
            if (!input) return;

            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";

            if (key && document.getElementById('mood-title').innerText.includes("Good")) {
                try {
                    let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Rangkum: " + input }] }] })
                    });
                    let data = await res.json();
                    display.innerHTML += "<br><br><b>Teto:</b> " + data.candidates[0].content.parts[0].text;
                } catch(e) { display.innerHTML += "<br><br><b>Teto:</b> API Error!"; }
            } else {
                display.innerHTML += "<br><br><b>Teto:</b> (Ngambek) API nggak valid! Cari sendiri di Google.";
                window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
