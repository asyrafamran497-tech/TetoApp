<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* Pengaturan Gambar: Ukuran kotak dan posisi */
        .teto-img { 
            width: 200px; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin: 20px auto; 
            display: block; 
        }

        #chat-area { 
            border: 1px solid #ddd; 
            padding: 15px; 
            text-align: left; 
            height: 200px; 
            overflow-y: auto; 
            margin-top: 20px; 
            width: 90%; 
            margin-left: auto; 
            margin-right: auto;
        }

        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Teto AI</h1>
    <img src="teto_diam.jpg" alt="Teto" class="teto-img">
    
    <div class="controls">
        <input type="text" id="userInput" placeholder="Tanya sesuatu ke Teto..." style="width: 70%; padding: 10px;">
        <button onclick="prosesChat()" style="padding: 10px;">Kirim</button>
    </div>

    <div id="chat-area">Teto: Halo! Apa yang ingin kamu bicarakan?</div>

    <div id="apiKeyPanel" style="margin-top: 30px; padding: 15px; border-top: 2px solid #eee;">
        <small>Pengaturan API:</small><br>
        <input type="password" id="keyInput" placeholder="Masukkan API Key...">
        <button onclick="simpanKey()">Simpan Key</button>
    </div>

    <script>
        // Load Key
        let API_KEY = localStorage.getItem('gemini_key');

        function simpanKey() {
            let key = document.getElementById('keyInput').value;
            if (key) {
                localStorage.setItem('gemini_key', key);
                alert("Key tersimpan!");
                location.reload();
            }
        }

        async function prosesChat() {
            let currentKey = localStorage.getItem('gemini_key');
            if (!currentKey) { alert("Masukkan API Key dulu di bawah!"); return; }
            
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            
            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            
            try {
                let response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + currentKey, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                let data = await response.json();
                let jawaban = data.candidates[0].content.parts[0].text;
                display.innerHTML += "<br><br><b>Teto:</b> " + jawaban;
            } catch (e) {
                display.innerHTML += "<br><br><b>Teto:</b> Error, cek API Key!";
            }
        }
    </script>
</body>
</html>
