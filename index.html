<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Tsundere App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 15px; font-size: 18px; }
        /* Kontainer Media agar selalu kotak */
        .media-container { width: 95%; aspect-ratio: 1 / 1; margin: 10px auto; border: 4px solid #ff69b4; border-radius: 20px; overflow: hidden; background: white; }
        .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; }
        
        #chat-area { border: 3px solid #ff69b4; padding: 20px; height: 350px; overflow-y: auto; width: 95%; margin: 10px auto; background: white; text-align: left; border-radius: 15px; font-size: 18px; line-height: 1.5; }
        .admin-panel { background: #ffe4e1; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #ff69b4; }
        input { padding: 15px; width: 75%; font-size: 18px; margin-bottom: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <strong>Teto Settings:</strong><br>
        <input type="text" id="apiKey" placeholder="Paste API Key...">
        <button onclick="saveKey()">Simpan</button>
        <div id="status-msg"></div>
    </div>

    <h2 id="mood-title">Mood: Ngambek (Mode Search) 😡</h2>
    
    <div class="media-container" id="media-box">
        <img src="teto_ngambek.jpg" id="tetoImg">
        <video id="tetoVid" style="display:none;" loop muted playsinline>
            <source src="teto_bicara.mp4" type="video/mp4">
        </video>
    </div>

    <div id="chat-area">Teto: Hah? Ngapain lo di sini?</div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu...">
    <button onclick="handleChat()">Kirim</button>

    <script>
        let isSpeaking = false;
        let talkInterval;

        function toggleMedia(speaking, mood) {
            let img = document.getElementById('tetoImg');
            let vid = document.getElementById('tetoVid');
            
            if (mood === 'good') {
                img.style.display = 'none';
                vid.style.display = speaking ? 'block' : 'none';
                if(speaking) vid.play(); else vid.pause();
            } else {
                vid.style.display = 'none';
                img.style.display = 'block';
                if(speaking) {
                    let frame = true;
                    talkInterval = setInterval(() => {
                        img.src = frame ? "teto_ngambek.jpg" : "teto_ngambek.png";
                        frame = !frame;
                    }, 200);
                } else {
                    clearInterval(talkInterval);
                    img.src = "teto_ngambek.jpg";
                }
            }
        }

        async function typeText(element, text) {
            let i = 0;
            toggleMedia(true, localStorage.getItem('gemini_key') ? 'good' : 'bad');
            for (let char of text) {
                element.innerHTML += char;
                await new Promise(r => setTimeout(r, 30));
            }
            toggleMedia(false, localStorage.getItem('gemini_key') ? 'good' : 'bad');
        }

        async function handleChat() {
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            if (!input) return;

            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";
            let responseDiv = document.createElement("div");
            responseDiv.innerHTML = "<br><br><b>Teto:</b> ";
            display.appendChild(responseDiv);

            // Langsung buka link search kalau API tidak ada/error (metode paling stabil)
            if (!localStorage.getItem('gemini_key')) {
                await typeText(responseDiv, "API Key kosong! Cari sendiri sana!");
                window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
            } else {
                // Gunakan Google Gemini
                try {
                    let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + localStorage.getItem('gemini_key'), {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Berperan sebagai Teto Tsundere, rangkum jawaban untuk: " + input }] }] })
                    });
                    let data = await res.json();
                    await typeText(responseDiv, data.candidates[0].content.parts[0].text);
                } catch(e) {
                    await typeText(responseDiv, "API Error! Cari sendiri sana!");
                    window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
                }
            }
            display.scrollTop = display.scrollHeight;
        }

        function saveKey() {
            localStorage.setItem('gemini_key', document.getElementById('apiKey').value);
            document.getElementById('status-msg').innerText = "Key Tersimpan!";
            document.getElementById('mood-title').innerText = "Mood: Good Mood (Tsundere) 😊";
        }
    </script>
</body>
</html>
