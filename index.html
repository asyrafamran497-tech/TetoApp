<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Teto Tsundere App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 15px; }
        .media-container { width: 95%; aspect-ratio: 1 / 1; margin: 10px auto; border: 4px solid #ff69b4; border-radius: 20px; overflow: hidden; background: white; }
        .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; }
        #chat-area { border: 3px solid #ff69b4; padding: 20px; height: 350px; overflow-y: auto; width: 95%; margin: 10px auto; background: white; text-align: left; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <strong>Teto Settings:</strong><br>
        <input type="text" id="apiKey" placeholder="Paste API Key di sini...">
        <button onclick="saveKey()">Simpan Key</button>
    </div>

    <h2 id="mood-title">Mood: Ngambek 😡</h2>
    <div class="media-container">
        <img src="teto_ngambek.jpg" id="tetoImg">
    </div>

    <div id="chat-area">Teto: Hah? Ngapain lo di sini?</div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu...">
    <button onclick="handleChat()">Kirim</button>

    <script>
        function saveKey() {
            let key = document.getElementById('apiKey').value;
            // Validasi: Kalau kodenya kepanjangan (bukan key), hapus
            if (key.length > 100) {
                alert("Itu bukan API Key! Itu kode HTML.");
                document.getElementById('apiKey').value = "";
                return;
            }
            localStorage.setItem('gemini_key', key);
            alert("Key tersimpan!");
            location.reload();
        }

        async function handleChat() {
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            let key = localStorage.getItem('gemini_key');
            
            if (!input) return;
            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            
            // Jika tidak ada key, jangan dipaksa cek ke server
            if (!key || key.length < 10) {
                display.innerHTML += "<br><br><b>Teto:</b> (Ngomel) Lo belum masukin API Key yang bener! Cari sendiri sana!";
                window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
                return;
            }

            try {
                let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Rangkum: " + input }] }] })
                });
                let data = await res.json();
                display.innerHTML += "<br><br><b>Teto:</b> " + data.candidates[0].content.parts[0].text;
            } catch(e) {
                display.innerHTML += "<br><br><b>Teto:</b> Error koneksi, cari sendiri ya!";
                window.open("https://duckduckgo.com/?q=" + encodeURIComponent(input), '_blank');
            }
        }
    </script>
</body>
</html>
