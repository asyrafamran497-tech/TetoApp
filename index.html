<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { width: 300px; border-radius: 15px; margin-bottom: 20px; }
        #userInput { width: 80%; padding: 10px; margin-bottom: 10px; }
        #chat-area { border: 1px solid #ddd; padding: 15px; text-align: left; height: 200px; overflow-y: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Teto AI</h1>
    <img src="teto_diam.jpg" alt="Teto">
    
    <div>
        <input type="text" id="userInput" placeholder="Tanya sesuatu ke Teto...">
        <button onclick="prosesChat()">Kirim</button>
    </div>

    <div id="chat-area">Teto: Halo! Apa yang ingin kamu bicarakan?</div>

    <!-- MODAL INPUT API KEY -->
    <div id="apiKeyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:10px; width:80%; text-align:center; color:black;">
            <h3>🔑 API Key Diperlukan</h3>
            <p>Masukkan Gemini API Key Anda:</p>
            <input type="password" id="keyInput" placeholder="AIza..." style="width:90%; padding:10px; margin-bottom:10px;">
            <br>
            <button onclick="simpanKey()" style="padding:10px 20px; background:#ff6666; color:white; border:none; border-radius:5px;">Simpan Key</button>
        </div>
    </div>

    <script>
        // Cek API Key saat halaman dimuat
        window.onload = function() {
            let savedKey = localStorage.getItem('gemini_key');
            if (!savedKey) {
                document.getElementById('apiKeyModal').style.display = 'flex';
            }
        };

        // Fungsi menyimpan key
        function simpanKey() {
            let inputKey = document.getElementById('keyInput').value;
            if (inputKey.trim() !== "") {
                localStorage.setItem('gemini_key', inputKey);
                document.getElementById('apiKeyModal').style.display = 'none';
                location.reload(); 
            } else {
                alert("API Key tidak boleh kosong!");
            }
        }

        async function prosesChat() {
            let API_KEY = localStorage.getItem('gemini_key');
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            if (!input) return;

            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";

            try {
                let response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                let data = await response.json();
                let jawaban = data.candidates[0].content.parts[0].text;
                display.innerHTML += "<br><br><b>Teto:</b> " + jawaban;
            } catch (e) {
                display.innerHTML += "<br><br><b>Teto:</b> Error, cek API Key!";
            }
        }
    </script>
</body>
</html>
