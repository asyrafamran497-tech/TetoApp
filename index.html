<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto Tsundere App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff0f5; padding: 10px; }
        .media-container { width: 95%; aspect-ratio: 1 / 1; margin: 10px auto; border: 4px solid #ff69b4; border-radius: 20px; overflow: hidden; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Chat box diperbesar */
        #chat-area { border: 3px solid #ff69b4; padding: 20px; height: 450px; overflow-y: auto; width: 95%; margin: 10px auto; background: white; text-align: left; border-radius: 15px; font-size: 18px; }
        
        /* Input & Button diperbesar */
        #userInput { width: 70%; padding: 15px; font-size: 18px; border: 2px solid #ff69b4; border-radius: 10px; }
        button { padding: 15px 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <input type="text" id="apiKey" placeholder="Paste API Key...">
        <button onclick="saveKey()">Simpan</button>
    </div>

    <div class="media-container">
        <img src="teto_ngambek.jpg" id="tetoImg">
    </div>

    <div id="chat-area">Teto: Hah? Ngapain lo di sini?</div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu...">
    <button onclick="handleChat()">Kirim</button>

    <script>
        function saveKey() {
            localStorage.setItem('gemini_key', document.getElementById('apiKey').value);
            alert("Key tersimpan!");
        }

        async function handleChat() {
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            let key = localStorage.getItem('gemini_key');
            if (!input) return;

            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";

            // Deteksi kata kunci gambar
            let keywords = ['foto', 'poto', 'photo', 'gambar', 'image'];
            if (keywords.some(word => input.toLowerCase().includes(word))) {
                let imgUrl = "https://source.unsplash.com/random/400x400/? " + encodeURIComponent(input);
                display.innerHTML += `<br><br><b>Teto:</b> Nih, gue ambilin gambar '${input}' buat lo! <br><img src="${imgUrl}" style="width:100%; border-radius:10px;">`;
            } 
            // Cek API Key & Proses Search
            else if (key && key.length > 10) {
                try {
                    let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Rangkum: " + input }] }] })
                    });
                    let data = await res.json();
                    display.innerHTML += "<br><br><b>Teto:</b> " + data.candidates[0].content.parts[0].text;
                } catch(e) { display.innerHTML += "<br><br><b>Teto:</b> API Error. Cari sendiri!"; }
            } else {
                // Fetch DuckDuckGo langsung di dalam chat (tidak nendang)
                display.innerHTML += "<br><br><b>Teto:</b> (Ngomel) Gak punya API! Bentar gue cariin di web...";
                let res = await fetch("https://api.duckduckgo.com/?q=" + encodeURIComponent(input) + "&format=json");
                let data = await res.json();
                let ans = data.AbstractText || "Gak dapet info!";
                display.innerHTML += "<br><br><b>Teto (Search):</b> " + ans;
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
