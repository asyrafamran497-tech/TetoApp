<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teto App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { width: 300px; border-radius: 15px; margin-bottom: 20px; }
        #input-box { width: 80%; padding: 10px; margin-bottom: 10px; }
        #chat-area { border: 1px solid #ddd; padding: 15px; text-align: left; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>Teto AI</h1>
    <img src="teto_diam.jpg" alt="Teto">
    
    <div>
        <input type="text" id="userInput" placeholder="Tanya sesuatu ke Teto...">
        <button onclick="prosesChat()">Kirim</button>
    </div>

    <div id="chat-area">Teto: Halo! Apa yang ingin kamu bicarakan?</div>

    <script>
        let API_KEY = localStorage.getItem('gemini_key');
        if (!API_KEY) {
            API_KEY = prompt("Masukkan API Key Gemini Anda:");
            if (API_KEY) localStorage.setItem('gemini_key', API_KEY);
        }

        async function prosesChat() {
            let input = document.getElementById("userInput").value;
            let display = document.getElementById("chat-area");
            if (!input) return;

            display.innerHTML += "<br><br><b>Kamu:</b> " + input;
            document.getElementById("userInput").value = "";

            try {
                let response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                let data = await response.json();
                let jawaban = data.candidates[0].content.parts[0].text;
                display.innerHTML += "<br><br><b>Teto:</b> " + jawaban;
            } catch (e) {
                display.innerHTML += "<br><br><b>Teto:</b> Error, cek API Key!";
            }
        }
    </script>
</body>
</html>
